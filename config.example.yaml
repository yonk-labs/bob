builder:
  cmd: opencode
  timeout_secs: 600
judge:
  cmd: abe
  mode: validate          # validate | debate
  timeout_secs: 600       # judge call timeout; abe debate can be slower than a build
verify:
  cmds:                   # objective gates; empty = abe-only (warned)
    - cargo test
loop:
  max_iterations: 3
  max_walltime_secs: 1800
scope:
  max_changed_files: 20
  max_changed_lines: 800
  allow_paths: []
apply: false
artifacts:
  dir: .bob/runs
