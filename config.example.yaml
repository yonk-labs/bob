builder:
  cmd: opencode
  timeout_secs: 600
  model: qwen             # default: a name from `models` below, or a raw provider/model id.
                          # omit entirely to use opencode's own default model.
  models:                 # named roster — switch per run with `bob build --model <name>`,
                          # list with `bob models`. (Model ids come from `opencode models`.)
    qwen:    ollama/Intel/Qwen3-Coder-Next-int4-AutoRound   # local, free — solid default for code
    minimax: minimax/MiniMax-M3                             # cloud, stronger (costs tokens)
  args: []                # extra opencode flags (NOT the model), e.g. ["--variant", "high"]
judge:
  cmd: abe
  mode: validate          # validate | debate
  timeout_secs: 600       # judge call timeout; abe debate can be slower than a build
verify:
  cmds:                   # objective gate(s) — your guardrails. ALL must pass.
    - cargo test          #   add lints/scanners here too, e.g. "cargo clippy -- -D warnings"
                          # empty list = no gate (converges on first diff; warned)
loop:
  max_iterations: 3
  max_walltime_secs: 1800
scope:
  max_changed_files: 20   # guardrail: cap blast radius
  max_changed_lines: 800
  allow_paths: []         # guardrail: [] = anywhere; else only these path prefixes may change
apply: false
artifacts:
  dir: .bob/runs
